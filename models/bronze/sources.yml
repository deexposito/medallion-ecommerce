version: 2

sources:
  - name: olist_raw
    description: >
      Raw transactional tables from the public Olist e-commerce dataset.
      Read directly from the original CSVs via `external_location` (the
      local equivalent of an external table over a data lake): they are
      too large and change-prone to be treated as static reference data,
      so they don't go through `dbt seed`. See the decision documented in
      `docs/decisions/0001-seeds-vs-external-sources.md`.
    tables:
      - name: customers
        meta:
          external_location: "data/raw/olist_customers_dataset.csv"
        description: "One row per customer: unique identifier and location (zip/city/state)."
      - name: orders
        meta:
          external_location: "data/raw/olist_orders_dataset.csv"
        description: "One row per order: status and timestamps across the full lifecycle (purchase, approval, shipping, delivery, estimate)."
      - name: order_items
        meta:
          external_location: "data/raw/olist_order_items_dataset.csv"
        description: "One row per order item (an order can contain multiple items)."
      - name: order_payments
        meta:
          external_location: "data/raw/olist_order_payments_dataset.csv"
        description: "Payments associated with each order (an order can have more than one payment)."
      - name: order_reviews
        meta:
          external_location: "data/raw/olist_order_reviews_dataset.csv"
        description: "Customer reviews of received orders."
      - name: products
        meta:
          external_location: "data/raw/olist_products_dataset.csv"
        description: "Product catalog: category and physical dimensions."
      - name: sellers
        meta:
          external_location: "data/raw/olist_sellers_dataset.csv"
        description: "Marketplace sellers, with location."
      - name: geolocation
        meta:
          external_location: "data/raw/olist_geolocation_dataset.csv"
        description: "Geographic coordinates per zip code prefix (many rows per zip)."
